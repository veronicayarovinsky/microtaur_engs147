; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; =====================================================
; --- shared settings inherited by all environments ---
; =====================================================
[env:due]
platform = atmelsam
board = dueUSB
framework = arduino
; default_envs = due         ; by default builds `main` environment (if env not specified by `run` terminal cmd
monitor_speed = 115200      ; baud rate
monitor_filters = log2file
lib_deps = 
    AxisEncoderShield3
    ArduinoMotorShieldR3
    ; VL53L4CD_ArduinoLib
    ; Adafruit BNO055
    ; Adafruit_BusIO
    ; Adafruit SSD1306
    ; Adafruit GFX Library


; [env:due]
; TO RUN MAIN:
build_src_filter = -<src/tests/>
; TO RUN TESTS (other files with setup/loop structure FILES
; build_src_filter = -<main.cpp> +<tests/bno055_heading_test.cpp>
; build_src_filter = -<main.cpp> +<tests/bno055_calibration.cpp>
; build_src_filter = -<main.cpp> +<tests/rotation_openloop_char.cpp>
